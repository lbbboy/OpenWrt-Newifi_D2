name: JD-ax1800-pro

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: jdc_ax1800_pro.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part3.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WET_RANSFER: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'Enable SSH connection?'
        required: true
        default: 'false'
        type: choice
        options:
          - false
          - true
      ngrok:
        description: 'Start SSH via ngrok'
        required: true
        default: 'false'
        type: choice
        options:
          - false
          - true

  schedule:
    - cron: 0 20 1 * *

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/lbbboy/OpenWrt-Newifi_D2/refs/heads/master/depends-ubuntu)
        sudo -E apt-get -qq install clang llvm lld pnpm
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Ultimate Fix for BPF Clang
      run: |
        # 1. 找到真实的编译器路径
        CLANG_PATH=$(which clang)
        LLC_PATH=$(which llc)
        
        # 2. 【核心修复】创建物理欺骗路径，解决脚本硬编码的 /invalid/clang 错误
        sudo mkdir -p /invalid
        sudo ln -sf $CLANG_PATH /invalid/clang
        sudo ln -sf $LLC_PATH /invalid/llc
        
        # 3. 补充版本号软链接，解决 "found: ." 的版本探测失败问题
        for v in 12 13 14 15; do
          sudo ln -sf $CLANG_PATH /usr/bin/clang-$v
          sudo ln -sf $LLC_PATH /usr/bin/llc-$v
        done

        # 4. 注入全局变量
        echo "CLANG=$CLANG_PATH" >> $GITHUB_ENV
        echo "LLVM=1" >> $GITHUB_ENV
        
        # 5. 验证
        ls -l /invalid/clang
        /invalid/clang --version

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        # 强制配置 BPF 工具链使用 Host 环境
        sed -i 's/.*CONFIG_BPF_TOOLCHAIN_HOST.*/CONFIG_BPF_TOOLCHAIN_HOST=y/' .config

    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: ${{ github.event.inputs.ssh == 'true' }}

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        
        # 【二次保险】在编译命令中直接传入 CLANG 变量，优先级最高
        make -j$(nproc) CLANG=/usr/bin/clang LLVM=1 || \
        make -j1 CLANG=/usr/bin/clang LLVM=1 || \
        make -j1 V=s CLANG=/usr/bin/clang LLVM=1
        
        echo "status=success" >> $GITHUB_ENV
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      if: env.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v1
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ env.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Telegram notification
      if: always()
      continue-on-error: true
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          curl -s -k --data chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
               --data "text=🎉 JD-ax1800-pro 编译成功 🔗 https://github.com/${{ github.repository }}/releases/latest/" \
               "https://api.telegram.org/bot${{ env.TELEGRAM_TOKEN }}/sendMessage"
        else
          curl -s -k --data chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
               --data "text=❌ JD-ax1800-pro 编译失败" \
               "https://api.telegram.org/bot${{ env.TELEGRAM_TOKEN }}/sendMessage"
        fi
